<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Whisper Login Preview</title>
    <style>
      :root {
        color-scheme: light;
        --app-bg: #f4f6f8;
        --panel-bg: #fbfcfd;
        --panel-alt: #eef2f5;
        --text: #23282f;
        --muted: #66717d;
        --border: #d9e0e6;
        --field-bg: #ffffff;
        --field-border: #c9d2da;
        --accent: #2f6f88;
        --accent-hover: #285f74;
        --accent-text: #ffffff;
        --canvas-bg: #f7f9fa;
        --canvas-line: #050505;
        --outer-bg: #dfecef;
        --window-bg: #f8fbfc;
        --window-border: #cbd5dd;
        --titlebar-bg: #f9fbfc;
        --soft-game-bg: #d9eef3;
        --soft-login-bg: #f8fafb;
        --sun-color: #efb84d;
        --sun-glow: rgb(239 184 77 / 34%);
        --moon-color: #f0ead7;
        --moon-shadow: rgb(67 85 118 / 24%);
        --shadow: 0 26px 70px rgb(31 42 53 / 16%);
      }

      :root[data-theme="night"] {
        color-scheme: light;
        --app-bg: #dde3e8;
        --panel-bg: #edf1f4;
        --panel-alt: #d3dbe2;
        --text: #24303c;
        --muted: #667583;
        --border: #c2ccd4;
        --field-bg: #f7fafb;
        --field-border: #b7c3cc;
        --accent: #8392a4;
        --accent-hover: #94a2b2;
        --accent-text: #ffffff;
        --canvas-bg: #dfe6eb;
        --canvas-line: #050505;
        --outer-bg: #9aa7b6;
        --window-bg: #dde5ea;
        --window-border: #9aa7b6;
        --titlebar-bg: #e9eef2;
        --soft-game-bg: #8392a4;
        --soft-login-bg: #eef3f6;
        --sun-color: #dca752;
        --sun-glow: rgb(220 167 82 / 0%);
        --moon-color: #f2ecd8;
        --moon-shadow: rgb(67 85 118 / 28%);
        --shadow: 0 26px 70px rgb(26 37 48 / 18%);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(16px, 4vw, 42px);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background-color: var(--outer-bg);
        color: var(--text);
        transition:
          background-color 5200ms ease-in-out,
          color 5200ms ease-in-out;
      }

      button,
      input {
        font: inherit;
      }

      .client-window {
        width: min(1120px, 100%);
        height: min(720px, calc(100vh - 32px));
        min-height: 560px;
        overflow: hidden;
        border: 1px solid var(--window-border);
        border-radius: 14px;
        background: var(--window-bg);
        box-shadow: var(--shadow);
        transition:
          background-color 5200ms ease-in-out,
          border-color 5200ms ease-in-out,
          box-shadow 5200ms ease-in-out;
      }

      .client-titlebar {
        height: 42px;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        padding: 0 14px;
        background: color-mix(in srgb, var(--titlebar-bg) 92%, transparent);
        border-bottom: 1px solid color-mix(in srgb, var(--window-border) 58%, transparent);
        transition:
          background-color 5200ms ease-in-out,
          border-color 5200ms ease-in-out;
      }

      .window-controls {
        display: flex;
        gap: 8px;
      }

      .window-dot {
        width: 11px;
        height: 11px;
        border-radius: 999px;
        background: var(--field-border);
        opacity: 0.85;
        transition: background-color 900ms ease;
      }

      .window-title {
        color: var(--muted);
        font-size: 12px;
        font-weight: 650;
        transition: color 900ms ease;
      }

      .app-shell {
        position: relative;
        overflow: hidden;
        height: calc(100% - 42px);
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 3fr) minmax(320px, 2fr);
        background:
          radial-gradient(ellipse at 18% 16%, color-mix(in srgb, var(--sun-color) 26%, transparent), transparent 25%),
          radial-gradient(ellipse at 36% 60%, rgb(255 255 255 / 24%), transparent 35%),
          linear-gradient(
            100deg,
            #d9eef3 0%,
            color-mix(in srgb, #d9eef3 45%, #f8fbfc) 46%,
            var(--soft-login-bg) 100%
        );
        transition: background 5200ms ease-in-out;
      }

      .app-shell::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 18% 17%, rgb(242 236 216 / 34%) 0 42px, transparent 44px),
          radial-gradient(circle at 29% 20%, rgb(238 245 255 / 46%) 0 1.5px, transparent 2px),
          radial-gradient(circle at 38% 33%, rgb(238 245 255 / 42%) 0 1.4px, transparent 2px),
          linear-gradient(
            100deg,
            #8392a4 0%,
            color-mix(in srgb, #8392a4 34%, var(--window-bg)) 46%,
            var(--soft-login-bg) 100%
          );
        opacity: 0;
        transition: opacity 5200ms ease-in-out;
      }

      :root[data-theme="night"] .app-shell::before {
        opacity: 1;
      }

      .game-panel,
      .login-panel {
        position: relative;
        z-index: 1;
        min-width: 0;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(24px, 5vw, 64px);
        transition:
          background-color 5200ms ease-in-out,
          border-color 5200ms ease-in-out;
      }

      .game-panel {
        position: relative;
        overflow: hidden;
        background: transparent;
        cursor: pointer;
        user-select: none;
      }

      .game-panel:focus-visible {
        outline: 3px solid rgb(47 111 136 / 30%);
        outline-offset: -8px;
      }

      .game-stage {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .celestial-layer {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }

      .sun,
      .moon {
        position: absolute;
        left: clamp(42px, 8vw, 112px);
        top: clamp(42px, 11vh, 92px);
        width: 50px;
        height: 50px;
        border-radius: 999px;
        transition:
          opacity 5200ms ease-in-out,
          transform 5200ms ease-in-out,
          box-shadow 5200ms ease-in-out,
          background-color 5200ms ease-in-out;
      }

      .sun {
        background: var(--sun-color);
        box-shadow: 0 0 46px var(--sun-glow);
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      .moon {
        background: var(--moon-color);
        box-shadow:
          inset -13px 0 0 var(--moon-shadow),
          0 0 32px rgb(242 236 216 / 24%);
        opacity: 0;
        transform: translateY(-56px) scale(0.82);
      }

      :root[data-theme="night"] .sun {
        opacity: 0;
        transform: translateY(68px) scale(0.78);
      }

      :root[data-theme="night"] .moon {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      .star-field {
        position: absolute;
        left: clamp(96px, 17vw, 210px);
        top: clamp(40px, 10vh, 88px);
        width: min(260px, 34vw);
        height: 140px;
        opacity: 0;
        background:
          radial-gradient(circle at 8% 34%, currentColor 0 1.8px, transparent 2.4px),
          radial-gradient(circle at 32% 10%, currentColor 0 1.4px, transparent 2px),
          radial-gradient(circle at 54% 38%, currentColor 0 1.4px, transparent 2px),
          radial-gradient(circle at 78% 18%, currentColor 0 1.2px, transparent 1.8px);
        color: rgb(238 245 255 / 72%);
        transition: opacity 5200ms ease-in-out;
      }

      :root[data-theme="night"] .star-field {
        opacity: 0.8;
      }

      .game-header {
        position: absolute;
        left: clamp(18px, 3vw, 34px);
        top: clamp(18px, 3vw, 30px);
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 16px;
        margin: 0;
      }

      .game-meta {
        display: flex;
        align-items: baseline;
        gap: 12px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgb(255 255 255 / 34%);
        backdrop-filter: blur(10px);
        color: var(--muted);
        font-size: 13px;
        transition:
          background-color 5200ms ease-in-out,
          color 5200ms ease-in-out;
      }

      .game-score {
        min-width: 82px;
        font-variant-numeric: tabular-nums;
        color: var(--text);
        transition: color 5200ms ease-in-out;
      }

      .canvas-wrap {
        position: absolute;
        inset: 0;
        z-index: 1;
        overflow: hidden;
        border-radius: 0;
        background: transparent;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        min-height: 0;
      }

      .login-panel {
        background: transparent;
      }

      .login-card {
        width: min(390px, 100%);
      }

      .brand-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 34px;
      }

      .brand-mark {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: var(--accent);
        color: var(--accent-text);
        font-weight: 700;
        transition:
          background-color 5200ms ease-in-out,
          color 5200ms ease-in-out;
      }

      .brand-name {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .login-title {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 34px);
        line-height: 1.12;
        letter-spacing: 0;
      }

      .login-subtitle {
        margin: 0 0 32px;
        color: var(--muted);
        font-size: 14px;
        transition: color 5200ms ease-in-out;
      }

      .login-form {
        display: grid;
        gap: 18px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field label {
        color: var(--text);
        font-size: 13px;
        font-weight: 650;
        transition: color 5200ms ease-in-out;
      }

      .field input {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--field-border);
        border-radius: 8px;
        padding: 0 14px;
        color: var(--text);
        background: var(--field-bg);
        outline: none;
        transition:
          background-color 220ms ease,
          border-color 220ms ease,
          box-shadow 220ms ease,
          color 220ms ease;
      }

      .field input:hover {
        border-color: color-mix(in srgb, var(--accent) 48%, var(--field-border));
      }

      .field input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 16%, transparent);
      }

      .form-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-top: 4px;
      }

      .forgot-link {
        color: var(--accent);
        font-size: 13px;
        font-weight: 650;
        text-decoration: none;
        transition: color 220ms ease;
      }

      .forgot-link:hover,
      .forgot-link:focus-visible {
        color: var(--accent-hover);
        text-decoration: underline;
      }

      .login-button {
        min-width: 128px;
        min-height: 46px;
        border: 0;
        border-radius: 8px;
        padding: 0 22px;
        color: var(--accent-text);
        background: var(--accent);
        font-weight: 700;
        cursor: pointer;
        transition:
          background-color 220ms ease,
          transform 160ms ease,
          box-shadow 220ms ease;
      }

      .login-button:hover {
        background: var(--accent-hover);
        transform: translateY(-1px);
        box-shadow: 0 10px 24px rgb(47 111 136 / 18%);
      }

      .login-button:active {
        transform: translateY(0);
        box-shadow: none;
      }

      .login-button:focus-visible {
        outline: 3px solid rgb(47 111 136 / 28%);
        outline-offset: 3px;
      }

      @media (max-width: 780px) {
        body {
          padding: 12px;
        }

        .client-window {
          height: auto;
          min-height: calc(100vh - 24px);
          border-radius: 12px;
        }

        .app-shell {
          grid-template-columns: 1fr;
          height: auto;
          min-height: calc(100vh - 66px);
        }

        .game-panel,
        .login-panel {
          min-height: auto;
          padding: 28px 20px;
        }

        .game-panel {
          min-height: 310px;
        }

        canvas {
          height: 100%;
          min-height: 0;
        }

        .brand-row {
          margin-bottom: 24px;
        }
      }

      @media (max-width: 430px) {
        .form-actions {
          align-items: stretch;
          flex-direction: column-reverse;
        }

        .login-button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="client-window" role="application" aria-label="Whisper 登录客户端">
      <div class="client-titlebar" aria-hidden="true">
        <div class="window-controls">
          <span class="window-dot"></span>
          <span class="window-dot"></span>
          <span class="window-dot"></span>
        </div>
        <div class="window-title">Whisper</div>
        <div></div>
      </div>

      <main class="app-shell">
        <section
          class="game-panel"
          tabindex="0"
          aria-label="小恐龙小游戏区域"
          data-game-panel
        >
          <div class="game-stage">
            <div class="celestial-layer" aria-hidden="true">
              <div class="sun"></div>
              <div class="moon"></div>
              <div class="star-field"></div>
            </div>
            <div class="game-header">
              <div class="game-meta" aria-live="polite">
                <span class="game-score" data-score>00000</span>
                <span data-status>Ready</span>
              </div>
            </div>
            <div class="canvas-wrap">
              <canvas data-game-canvas aria-hidden="true"></canvas>
            </div>
          </div>
        </section>

        <section class="login-panel" aria-label="登录区域" data-login-panel>
          <div class="login-card">
            <div class="brand-row">
              <div class="brand-mark" aria-hidden="true">W</div>
              <div class="brand-name">Whisper</div>
            </div>

            <h1 class="login-title">登录</h1>
            <p class="login-subtitle">使用你的账号继续。</p>

            <form class="login-form" data-login-form>
              <div class="field">
                <label for="account">账号</label>
                <input
                  id="account"
                  name="account"
                  type="text"
                  autocomplete="username"
                  placeholder="请输入账号"
                />
              </div>

              <div class="field">
                <label for="password">密码</label>
                <input
                  id="password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  placeholder="请输入密码"
                />
              </div>

              <div class="form-actions">
                <a class="forgot-link" href="#" data-forgot-link>忘记密码</a>
                <button class="login-button" type="submit">登录</button>
              </div>
            </form>
          </div>
        </section>
      </main>
    </div>

    <script src="login-preview-game.js"></script>
  </body>
</html>
